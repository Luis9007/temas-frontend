<div class="page-wrapper">
  <header class="page-header">
    <div class="header-content">
      <a routerLink="/temas" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Temas
      </a>
      <div class="title-block">
        <span class="label">{{ isEditMode ? 'Editar' : 'Nuevo' }}</span>
        <h1>{{ isEditMode ? 'Modificar tema' : 'Crear tema' }}</h1>
      </div>
    </div>
  </header>

  <main class="page-body">
    <div *ngIf="loading" class="state-block">
      <div class="spinner"></div>
      <p>Cargando…</p>
    </div>

    <div *ngIf="!loading">
      <div *ngIf="error" class="alert-error">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate class="form-card">
        <div class="form-group" [class.has-error]="temaControl?.invalid && temaControl?.touched">
          <label for="tema">Nombre del tema <span class="required">*</span></label>
          <input
            id="tema"
            type="text"
            formControlName="tema"
            placeholder="Ej: Matemáticas, Historia…"
            autocomplete="off"
          />
          <div class="field-error" *ngIf="temaControl?.touched && temaControl?.errors">
            <span *ngIf="temaControl?.errors?.['required']">Este campo es obligatorio.</span>
            <span *ngIf="temaControl?.errors?.['minlength']">Mínimo 2 caracteres.</span>
            <span *ngIf="temaControl?.errors?.['maxlength']">Máximo 100 caracteres.</span>
          </div>
        </div>

        <div class="form-actions">
          <a routerLink="/temas" class="btn-secondary">Cancelar</a>
          <button type="submit" class="btn-primary" [disabled]="saving">
            <span *ngIf="!saving">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              {{ isEditMode ? 'Guardar cambios' : 'Crear tema' }}
            </span>
            <span *ngIf="saving" class="saving-state">
              <span class="spinner-sm"></span>
              Guardando…
            </span>
          </button>
        </div>
      </form>
    </div>
  </main>
</div>
