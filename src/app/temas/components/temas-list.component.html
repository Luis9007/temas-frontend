<div class="page-wrapper">
  <header class="page-header">
    <div class="header-content">
      <div class="title-block">
        <span class="label">Gestión</span>
        <h1>Temas</h1>
      </div>
      <div class="header-actions">
        <input
          type="text"
          placeholder="Buscar por nombre..."
          [value]="searchTerm"
          (input)="onSearchChange($event)"
          class="search-input"
        />
        <a routerLink="/temas/nuevo" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nuevo tema
        </a>
      </div>
    </div>
  </header>

  <main class="page-body">
    <div *ngIf="loading" class="state-block">
      <div class="spinner"></div>
      <p>Cargando temas…</p>
    </div>

    <div *ngIf="error && !loading" class="alert-error">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
      <button (click)="loadTemas()" class="btn-retry">Reintentar</button>
    </div>

    <div *ngIf="!loading && !error">
      <div *ngIf="temas.length === 0" class="state-block empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/>
        </svg>
        <p>No hay temas registrados.</p>
        <a routerLink="/temas/nuevo" class="btn-primary sm">Crear el primero</a>
      </div>

      <div *ngIf="temas.length > 0" class="table-container">
        <div class="table-meta">
          <span>{{ filteredTemas.length }} resultado{{ filteredTemas.length !== 1 ? 's' : '' }}</span>
          <span *ngIf="searchTerm && filteredTemas.length !== temas.length" class="search-info">
            (filtrado de {{ temas.length }})
          </span>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th class="col-id">#</th>
              <th>Nombre del tema</th>
              <th class="col-actions">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let tema of filteredTemas" [class.confirm-row]="deleteConfirmId === tema.id">
              <td class="col-id" data-label="ID">
                <span class="id-badge">{{ tema.id }}</span>
              </td>
              <td class="col-name" data-label="Nombre">{{ tema.nombre_tema }}</td>
              <td class="col-actions" data-label="Acciones">
                <ng-container *ngIf="deleteConfirmId !== tema.id; else confirmBlock">
                  <a [routerLink]="['/temas', tema.id, 'editar']" class="btn-icon edit" title="Editar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                  </a>
                  <button (click)="confirmDelete(tema.id)" class="btn-icon delete" title="Eliminar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                      <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
                    </svg>
                  </button>
                </ng-container>
                <ng-template #confirmBlock>
                  <div class="confirm-actions">
                    <span class="confirm-text">¿Eliminar?</span>
                    <button (click)="deleteTema(tema.id)" class="btn-confirm-yes">Sí</button>
                    <button (click)="cancelDelete()" class="btn-confirm-no">No</button>
                  </div>
                </ng-template>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
