<div class="page-wrapper">
  <header class="page-header">
    <div class="header-content">
      <a routerLink="/aprendices" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Aprendices
      </a>
      <div class="title-block">
        <span class="label">{{ isEditMode ? 'Editar' : 'Nuevo' }}</span>
        <h1>{{ isEditMode ? 'Modificar aprendiz' : 'Crear aprendiz' }}</h1>
      </div>
    </div>
  </header>

  <main class="page-body">
    <div *ngIf="loading" class="state-block">
      <div class="spinner"></div>
      <p>Cargando…</p>
    </div>

    <div *ngIf="!loading">
      <div *ngIf="error" class="alert-error">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate class="form-card">

        <div class="form-group" [class.has-error]="f['cedula'].invalid && f['cedula'].touched">
          <label for="cedula">Cédula <span class="required">*</span></label>
          <input id="cedula" type="text" formControlName="cedula" placeholder="Ej: 1234567890" autocomplete="off"/>
          <div class="field-error" *ngIf="f['cedula'].touched && f['cedula'].errors">
            <span *ngIf="f['cedula'].errors['required']">Este campo es obligatorio.</span>
            <span *ngIf="f['cedula'].errors['maxlength']">Máximo 20 caracteres.</span>
          </div>
        </div>

        <div class="form-group" [class.has-error]="f['nombre_completo'].invalid && f['nombre_completo'].touched">
          <label for="nombre_completo">Nombre completo <span class="required">*</span></label>
          <input id="nombre_completo" type="text" formControlName="nombre_completo" placeholder="Ej: Juan Pérez García" autocomplete="off"/>
          <div class="field-error" *ngIf="f['nombre_completo'].touched && f['nombre_completo'].errors">
            <span *ngIf="f['nombre_completo'].errors['required']">Este campo es obligatorio.</span>
            <span *ngIf="f['nombre_completo'].errors['maxlength']">Máximo 150 caracteres.</span>
          </div>
        </div>

        <div class="form-group" [class.has-error]="f['fecha_nacimiento'].invalid && f['fecha_nacimiento'].touched">
          <label for="fecha_nacimiento">Fecha de nacimiento <span class="required">*</span></label>
          <input id="fecha_nacimiento" type="date" formControlName="fecha_nacimiento"/>
          <div class="field-error" *ngIf="f['fecha_nacimiento'].touched && f['fecha_nacimiento'].errors">
            <span *ngIf="f['fecha_nacimiento'].errors['required']">Este campo es obligatorio.</span>
          </div>
        </div>

        <div class="form-actions">
          <a routerLink="/aprendices" class="btn-secondary">Cancelar</a>
          <button type="submit" class="btn-primary" [disabled]="saving">
            <span *ngIf="!saving">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              {{ isEditMode ? 'Guardar cambios' : 'Crear aprendiz' }}
            </span>
            <span *ngIf="saving" class="saving-state">
              <span class="spinner-sm"></span>
              Guardando…
            </span>
          </button>
        </div>
      </form>
    </div>
  </main>
</div>
